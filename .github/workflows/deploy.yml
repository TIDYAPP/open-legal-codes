name: Deploy API to Hetzner

on:
  push:
    branches: [main]
    paths-ignore:
      - 'web/**'
      - '*.md'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1
        env:
          COURTLISTENER_API_TOKEN: ${{ secrets.COURTLISTENER_API_TOKEN }}
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: COURTLISTENER_API_TOKEN,ADMIN_SECRET
          script: |
            cd /opt/open-legal-codes
            git pull origin main
            # Ensure persistent data directories exist
            mkdir -p /root/data /root/codes
            # Seed registry/census files into persistent volume (always update from repo)
            cp -f data/registry.json data/census-places.json data/manual-sources.json data/amlegal-known.json /root/data/ 2>/dev/null || true
            cp -rf data/census /root/data/ 2>/dev/null || true
            # Update secrets in .env (preserve other vars)
            touch .env
            grep -v '^COURTLISTENER_API_TOKEN=\|^ADMIN_SECRET=' .env > .env.tmp || true
            echo "COURTLISTENER_API_TOKEN=${COURTLISTENER_API_TOKEN}" >> .env.tmp
            echo "ADMIN_SECRET=${ADMIN_SECRET}" >> .env.tmp
            mv .env.tmp .env
            # Stop standalone containers from pre-compose era (if any)
            docker stop openlegalcodes-api 2>/dev/null && docker rm openlegalcodes-api 2>/dev/null || true
            docker stop caddy 2>/dev/null && docker rm caddy 2>/dev/null || true
            docker compose build
            docker compose up -d
            docker image prune -f
            # Health check
            sleep 5
            curl -sf http://localhost:3100/ || echo "Warning: health check failed, server may still be starting"

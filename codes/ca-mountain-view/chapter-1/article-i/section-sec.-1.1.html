<div class="chunk-title">SEC. 1.1. - How code designated and cited.</div>
<div class="chunk-content">
            <p class="p0">
               The ordinances embraced in the following chapters and sections shall constitute and
               be designated "The Code of the City of Mountain View, California," and may be so cited.
               Such code may also be cited as the "Mountain View City Code."
               </p>
            <p class="historynote0">
               (Code 1938, Sec. 1.)
               </p></div>

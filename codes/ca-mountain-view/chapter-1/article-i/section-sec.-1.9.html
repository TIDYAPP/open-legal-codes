<div class="chunk-title">SEC. 1.9. - Same—Same—Failure to appear.</div>
<div class="chunk-content">
            <p class="p0">
               Any person wilfully violating his written promise to appear in court issued pursuant
               to the preceding section, is guilty of a misdemeanor regardless of the disposition
               of the charge upon which he was originally arrested.
               </p>
            <p class="historynote0">
               (Ord. No. 175.457, 3/10/58.)
               </p></div>

<div class="chunk-title">SEC. 1.11. - Same—Imprisonment of violators.</div>
<div class="chunk-content">
            <p class="p0">
               Any person sentenced to imprisonment for the violation of any provision of this code
               or of any ordinance of this city may be imprisoned.
               </p>
            <p class="historynote0">
               (Code 1938, Sec. 24.)

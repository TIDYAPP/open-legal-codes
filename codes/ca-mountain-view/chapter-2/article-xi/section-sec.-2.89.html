<div class="chunk-title">SEC. 2.89. - Lease of city property.</div>
<div class="chunk-content">
            <p class="p0">
               Except as provided herein, property owned, held or controlled by the city may be leased
               for a period not to exceed fifty-five (55) years.
               </p>
            <p class="historynote0">
               (Ord. No. 22.94, 11/22/94; Ord. No. 11.18, § 1, 10/23/18.)
               </p></div>

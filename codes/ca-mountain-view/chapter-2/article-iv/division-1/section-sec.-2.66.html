<div class="chunk-title">SEC. 2.66. - Created; composition.</div>
<div class="chunk-content">
            <p class="p0">
               The police department of the city is hereby created. The department shall consist
               of a chief of police and such other subordinate officers, assistants, deputies and
               employees as the council may deem necessary.
               </p>
            <p class="historynote0">
               (Code 1938, Sec. 190; Ord. No. 15.79, 4/9/79.)
               </p></div>

<div class="chunk-title">SEC. 2.174. - Nonapplicability.</div>
<div class="chunk-content">
            <p class="p0">
               The limitations of this division shall not apply to expenditures of a candidate's
               personal funds on behalf of their own candidacy.
               </p>
            <p class="historynote0">
               (<a class="ordinance-link" href="" data-product-id="16508" data-ordinance-id="1148880">Ord. No. 5.22</a>, § 6, 4/26/22.)
               </p></div>

<div class="chunk-title">SEC. 2.210. - Cooperative purchasing.</div>
<div class="chunk-content">
            <p class="p0">
               The purchasing agent shall have the authority to join with other units of government
               in cooperative purchasing plans when the best interest of the city would be served
               thereby.
               </p>
            <p class="historynote0">
               (Ord. No. 7.16, § 1, 5/24/16.)
               </p></div>

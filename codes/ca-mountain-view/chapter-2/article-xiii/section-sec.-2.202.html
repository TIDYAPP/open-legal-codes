<div class="chunk-title">SEC. 2.202. - Terms defined.</div>
<div class="chunk-content">
            <p class="p0">
               The terms "purchases" or "purchasing," as hereinafter used, shall include the terms
               "contracts for" or "contracting for" or "procurement of" or "procure."
               </p>
            <p class="historynote0">
               (Ord. No. 7.16, § 1, 5/24/16.)
               </p></div>

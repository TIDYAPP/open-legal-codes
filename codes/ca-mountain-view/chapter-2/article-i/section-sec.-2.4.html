<div class="chunk-title">SEC. 2.4. - Use of city property—Limited to lawful business of city.</div>
<div class="chunk-content">
            <p class="p0">
               No person or persons other than city officials or employees shall use any city-owned
               equipment, tools or paraphernalia other than for the purpose of conducting the lawful
               business of the city.
               </p>
            <p class="historynote0">
               (Ord. No. 175.266, 7/14/54.)
               </p></div>

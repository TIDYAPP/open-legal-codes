<div class="chunk-title">SEC. 2.10. - Same—Casual employees.</div>
<div class="chunk-content">
            <p class="p0">
               The director of finance is authorized to disburse warrants for the payment of all
               accrued wages earned by casual employees on completion of work or services performed.
               </p>
            <p class="historynote0">
               (Code 1938, Sec. 101; Ord. No. 175.197, 1/14/53.)
               </p></div>

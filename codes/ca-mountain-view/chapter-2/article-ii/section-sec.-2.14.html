<div class="chunk-title">SEC. 2.14. - Personnel rules and regulations.</div>
<div class="chunk-content">
            <p class="p0">
               The council, upon recommendation of the city manager, shall adopt by resolution personnel
               rules and regulations governing the implementation and administration of the city's
               personnel system.
               </p>
            <p class="historynote0">
               (Ord. No. 175.272, 8/11/54; Ord. No. 9.86, 3/18/86.)
               </p></div>

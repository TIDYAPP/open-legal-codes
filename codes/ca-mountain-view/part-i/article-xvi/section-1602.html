<div class="chunk-title">Section 1602. - Effect of invalid provision in Charter.</div>
<div class="chunk-content">
            <p class="p0">
               If any provision of this Charter, or the application thereof to any person or circumstance
               is held invalid, the remainder of the Charter, and the application of such provision
               to other persons or circumstances, shall not be affected thereby.
               </p></div>

<div class="chunk-title">Section 1713. - Non-waivability.</div>
<div class="chunk-content">
            <p class="p0">
               Any provision of a Rental Housing Agreement, whether oral or written, which purports
               to waive any provision of this Article established for the benefit of the Tenant,
               shall be deemed to be against public policy and shall be void.
               </p>
            <p class="historynote0">
               (As added November 8, 2016.)
               </p></div>

<div class="chunk-title">Section 515. - Ayes and noes.</div>
<div class="chunk-content">
            <p class="p0">
               Upon the adoption of any ordinance the clerk shall call the roll and shall cause the
               ayes and noes to be entered in the minutes of the meeting. Upon the request of any
               member the ayes and noes shall be taken and recorded on any vote.
               </p></div>

<div class="chunk-title">Section 601. - Compensation.</div>
<div class="chunk-content">
            <p class="p0">
               The city manager shall be paid a salary commensurate with the city manager's responsibilities
               as chief administrative officer of the city, which salary shall be established by
               ordinance or resolution.
               </p>
            <p class="historynote0">
               (As amended June 3, 1980.)
               </p></div>

<div class="chunk-title">Section 606. - Additional duties.</div>
<div class="chunk-content">
            <p class="p0">
               Subject to the approval of the council, the city manager may act as head of any office,
               department or agency of the city under the city manager's control for which the city
               manager is qualified by training or experience.
               </p>
            <p class="historynote0">
               (As amended June 3, 1980.)
               </p></div>

<div class="chunk-title">Section 1002. - Rules and regulations.</div>
<div class="chunk-content">
            <p class="p0">
               The personnel system provided by this article shall be implemented by such rules and
               regulations governing the administration thereof as are adopted by the council upon
               the recommendation of the city manager.
               </p>
            <p class="historynote0">
               (As amended June 3, 1980.)
               </p></div>

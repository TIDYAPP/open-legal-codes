<div class="chunk-title">Section 704. - Oath of office.</div>
<div class="chunk-content">
            <p class="p0">
               Every officer of the city, before entering upon the duties of that person's office,
               shall take the oath of office as provided for in the constitution of this state, and
               shall file the same with the city clerk.
               </p>
            <p class="historynote0">
               (As amended June 3, 1980.)
               </p></div>

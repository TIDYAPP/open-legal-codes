<div class="chunk-title">SEC. 3.5. - Distributing, etc., on vacant premises prohibited.</div>
<div class="chunk-content">
            <p class="p0">
               No person shall distribute, deposit, place, throw, scatter or cast any commercial
               or noncommercial handbill in or upon any private premises which are temporarily or
               continuously uninhabited or vacant.
               </p>
            <p class="historynote0">
               (Ord. No. 175.481, 6/30/58.)
               </p></div>

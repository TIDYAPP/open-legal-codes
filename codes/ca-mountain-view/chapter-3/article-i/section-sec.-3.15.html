<div class="chunk-title">SEC. 3.15. - Exceptions to chapter provisions.</div>
<div class="chunk-content">
            <p class="p0">
               The provisions of this chapter shall not be deemed to apply to the distribution of
               mail by the United States, nor to newspapers as defined in this chapter.
               </p>
            <p class="historynote0">
               (Ord. No. 175.481, 6/30/58.)

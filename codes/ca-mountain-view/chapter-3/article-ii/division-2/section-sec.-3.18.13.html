<div class="chunk-title">SEC. 3.18.13. - Same—Duration.</div>
<div class="chunk-content">
            <p class="p0">
               Permits issued pursuant to this division shall become null and void upon the expiration
               of six (6) months after the date of issuance if the work authorized by such permit
               has not been completed.
               </p>
            <p class="historynote0">
               (Ord. No. 175.622, 8/8/60.)
               </p></div>
